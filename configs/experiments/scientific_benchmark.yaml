name: scientific-benchmark
description: Scientific and medical retrieval benchmark using BEIR datasets
datasets:
  - nfcorpus
  - scifact
models:
  - qwen3-embedding-4b
  - qwen3-embedding-8b
  - llama-embed-nemotron-8b
precisions:
  - fp16
  - int8
pipeline:
  chunk_size: 512
  chunk_overlap: 50
  retrieval_top_k: 10
