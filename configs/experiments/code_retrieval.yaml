name: code-retrieval
description: CodeSearchNet benchmark across all 6 programming languages
datasets:
  - codesearchnet-python
  - codesearchnet-java
  - codesearchnet-javascript
  - codesearchnet-go
  - codesearchnet-php
  - codesearchnet-ruby
models:
  - qwen3-embedding-4b
  - qwen3-embedding-8b
precisions:
  - fp16
pipeline:
  chunk_size: 1024
  chunk_overlap: 100
  retrieval_top_k: 10
