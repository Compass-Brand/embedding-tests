name: rerankers
description: Multimodal reranker comparison
# Optional 'datasets' field: list of dataset names to evaluate against.
# When omitted, the experiment uses the default dataset(s) defined by the runner.
# Example:
#   datasets:
#     - ms_marco
#     - natural_questions
models:
  - qwen3-embedding-0.6b
  - qwen3-vl-reranker-2b
  - qwen3-vl-reranker-8b
precisions:
  - fp16
  - int8
pipeline:
  chunk_size: 512
  chunk_overlap: 50
  retrieval_top_k: 100
  reranker_top_k: 10
