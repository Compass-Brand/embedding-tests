name: technical-qa
description: Technical Q&A retrieval using CQADupStack StackExchange datasets
datasets:
  - cqadupstack-programmers
  - cqadupstack-unix
  - cqadupstack-tex
  - cqadupstack-stats
models:
  - qwen3-embedding-4b
  - octen-embedding-8b
precisions:
  - fp16
pipeline:
  chunk_size: 512
  chunk_overlap: 50
  retrieval_top_k: 10
