name: technical-qa
description: CQADupStack technical Q&A retrieval (all 13 MTEB datasets)
datasets:
  - cqadupstack-android
  - cqadupstack-english
  - cqadupstack-gaming
  - cqadupstack-gis
  - cqadupstack-mathematica
  - cqadupstack-physics
  - cqadupstack-programmers
  - cqadupstack-stats
  - cqadupstack-tex
  - cqadupstack-unix
  - cqadupstack-webmasters
  - cqadupstack-wordpress
  - stackoverflow-dupquestions
models:
  - qwen3-embedding-4b
  - qwen3-embedding-8b
precisions:
  - fp16
pipeline:
  chunk_size: 512
  chunk_overlap: 50
  retrieval_top_k: 10
