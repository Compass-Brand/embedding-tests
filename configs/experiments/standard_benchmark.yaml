name: standard-benchmark
description: Standard BEIR benchmark across all text embedding models
datasets:
  - nfcorpus
  - scifact
  - arguana
  - fiqa
models:
  - qwen3-embedding-0.6b
  - qwen3-embedding-4b
  - qwen3-embedding-8b
  - llama-embed-nemotron-8b
  - octen-embedding-8b
  - kalm-embedding-gemma3-12b
precisions:
  - fp16
  - int8
pipeline:
  chunk_size: 512
  chunk_overlap: 50
  retrieval_top_k: 10
